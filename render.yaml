services:
  - type: web
    name: dingking
    env: python
    plan: free
    autoDeploy: true
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: WW_AGENT_AUTO_START
        value: "0"
      - key: WW_LINK_AGENT_AUTO_START
        value: "0"
      - key: GAMBLY_ENABLED
        value: "true"
